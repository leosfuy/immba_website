<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" fill="none" role="img" aria-label="imMBA logo">
  <defs>
    <linearGradient id="bg" x1="22" y1="18" x2="182" y2="192" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="0.55" stop-color="#A78BFA" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="ink" x1="40" y1="40" x2="168" y2="168" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <linearGradient id="accent" x1="52" y1="132" x2="164" y2="76" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="240" height="240" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Base tile -->
  <rect x="10" y="10" width="180" height="180" rx="42" fill="#FFFFFF" fill-opacity="0.92"/>
  <rect x="10.5" y="10.5" width="179" height="179" rx="41.5" stroke="#0B1220" stroke-opacity="0.22"/>
  <rect x="18" y="18" width="164" height="164" rx="38" fill="url(#bg)"/>

  <!-- Glow -->
  <g filter="url(#soft)" opacity="0.55">
    <circle cx="70" cy="64" r="26" fill="#22D3EE" fill-opacity="0.18"/>
    <circle cx="142" cy="58" r="22" fill="#A78BFA" fill-opacity="0.18"/>
    <circle cx="146" cy="142" r="28" fill="#34D399" fill-opacity="0.14"/>
  </g>

  <!-- Globe / international -->
  <circle cx="96" cy="98" r="46" stroke="url(#accent)" stroke-width="7" stroke-opacity="0.95"/>
  <path d="M50 98H142" stroke="url(#ink)" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
  <path d="M96 52C80 68 80 128 96 144" stroke="url(#ink)" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
  <path d="M96 52C112 68 112 128 96 144" stroke="url(#ink)" stroke-width="4.5" stroke-linecap="round" opacity="0.92"/>
  <path d="M62 76C76 84 116 84 130 76" stroke="url(#ink)" stroke-width="4" stroke-linecap="round" opacity="0.70"/>
  <path d="M62 120C76 112 116 112 130 120" stroke="url(#ink)" stroke-width="4" stroke-linecap="round" opacity="0.70"/>

  <!-- Finance / growth -->
  <path
    d="M58 124C70 114 78 118 88 108C98 98 108 104 116 94C126 82 136 88 148 72"
    stroke="url(#accent)"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path d="M148 72L142 72" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <path d="M148 72L148 78" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>

  <!-- (Removed bottom blocks per request) -->
</svg>

